repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-merge-conflict
      - id: debug-statements

  - repo: local
    hooks:
      - id: rust-fmt
        name: rust fmt
        entry: cargo fmt --all -- --check
        language: system
        files: \.rs$
        pass_filenames: false

      - id: rust-clippy
        name: rust clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        files: \.rs$
        pass_filenames: false

      - id: prettier
        name: prettier
        entry: sh -c 'PATH="/home/kade/.local/share/pnpm:$PATH" pnpm format'
        language: system
        types_or: [yaml, markdown, html, css, scss, javascript, json, ts, tsx]

      - id: eslint
        name: eslint
        entry: sh -c 'PATH="/home/kade/.local/share/pnpm:$PATH" pnpm lint:ts'
        language: system
        files: \.(js|ts|tsx)$
        pass_filenames: false
