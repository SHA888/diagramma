name: Benchmark

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.85.0
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Run benchmarks
        run: |
          cd crates/diagramma-layout
          cargo bench --all-features

      - name: Process benchmark results
        run: |
          cd crates/diagramma-layout
          # Create a simple JSON summary for benchmark-action
          echo '{"benchmarks": [' > benchmark-results.json
          first=true
          for benchmark in ../../target/criterion/*/report/index.html; do
            if [ -f "$benchmark" ]; then
              name=$(basename $(dirname $(dirname "$benchmark")))
              if [ "$first" = true ]; then
                first=false
              else
                echo ',' >> benchmark-results.json
              fi
              echo "{\"name\": \"$name\", \"value\": 1}" >> benchmark-results.json
            fi
          done
          echo ']}' >> benchmark-results.json

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'custom'
          output-file-path: crates/diagramma-layout/benchmark-results.json
          comment-on-alert: true
          alert-threshold: '200%'
          fail-on-alert: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: target/criterion/
          retention-days: 30
