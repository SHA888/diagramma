name: Publish (crates.io + npm)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure CI workflows succeeded
        uses: actions/github-script@v7
        with:
          script: |
            const required = ["Rust CI", "TypeScript CI"];
            const {owner, repo} = context.repo;
            const response = await github.paginate(github.rest.checks.listForRef, {
              owner,
              repo,
              ref: context.sha,
              per_page: 100,
            }, res => res.data);

            const results = {};
            for (const run of response) {
              if (!required.includes(run.name)) continue;
              if (!run.completed_at || run.status !== "completed") continue;
              const existing = results[run.name];
              if (!existing || new Date(run.completed_at) > new Date(existing.completed_at)) {
                results[run.name] = run;
              }
            }

            for (const name of required) {
              const result = results[name];
              if (!result) {
                core.setFailed(`Required workflow "${name}" has not completed for this commit.`);
                return;
              }
              if (result.conclusion !== "success") {
                core.setFailed(`Required workflow "${name}" did not succeed (conclusion: ${result.conclusion}).`);
                return;
              }
            }

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Configure npm auth token
        run: |
          npm config set //registry.npmjs.org/:_authToken $NPM_TOKEN
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Run publish script
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: bash scripts/publish-reserve.sh
