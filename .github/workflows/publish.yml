name: Publish (crates.io + npm)

on:
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows: ['Rust CI', 'TypeScript CI', 'Benchmark']
    types:
      - completed
    branches: [main, 'v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure CI workflows succeeded
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const required = [
              { workflow: "Rust CI", job: "rust", label: "Rust CI" },
              { workflow: "TypeScript CI", job: "ts", label: "TypeScript CI" },
              { workflow: "Benchmark", job: "benchmark", label: "Benchmark" },
            ];

            // Get the tag from the ref (remove 'refs/tags/' prefix)
            const tag = context.ref.replace('refs/tags/', '');
            const isTag = context.ref.startsWith('refs/tags/');

            // For workflow_run events, check the triggering workflow
            if (context.eventName === 'workflow_run') {
              const triggeringWorkflow = context.payload.workflow_run.name;
              console.log(`Triggered by workflow: ${triggeringWorkflow}`);
              
              // Only proceed if this is one of our required workflows
              if (!required.find(r => r.workflow === triggeringWorkflow)) {
                console.log('Not a required workflow, skipping publish');
                core.setOutput('should-publish', 'false');
                return;
              }
            }

            // For tags, check all required workflows have completed
            if (isTag) {
              const {owner, repo} = context.repo;
              const response = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
                owner,
                repo,
                head_sha: context.sha,
                per_page: 100,
              }, res => res.data.workflow_runs);

              const results = {};
              for (const run of response) {
                const req = required.find(r => r.workflow === run.name);
                if (!req) continue;
                if (!run.conclusion || run.status !== "completed") continue;
                const existing = results[req.workflow];
                if (!existing || new Date(run.updated_at) > new Date(existing.updated_at)) {
                  results[req.workflow] = run;
                }
              }

              console.log('Checking required workflows:', JSON.stringify(results, null, 2));

              for (const {workflow, label} of required) {
                const result = results[workflow];
                if (!result) {
                  console.log(`Required workflow "${label}" has not completed for this tag.`);
                  core.setOutput('should-publish', 'false');
                  return;
                }
                if (result.conclusion !== "success") {
                  console.log(`Required workflow "${label}" did not succeed (conclusion: ${result.conclusion}).`);
                  core.setOutput('should-publish', 'false');
                  return;
                }
                console.log(`✓ ${label} completed successfully`);
              }
            }

            core.setOutput('should-publish', 'true');

      - name: Install Rust toolchain
        if: steps.check.outputs.should-publish == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0

      - name: Install Node.js
        if: steps.check.outputs.should-publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        if: steps.check.outputs.should-publish == 'true'
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Configure npm auth token
        if: steps.check.outputs.should-publish == 'true'
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Run publish script
        if: steps.check.outputs.should-publish == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: bash scripts/publish-reserve.sh
